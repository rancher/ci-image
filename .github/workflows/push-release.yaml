name: push and release

on:
  push:
    branches:
      - 'main'
    paths:
      - 'dockerfiles/**'

  workflow_dispatch:

concurrency:
  group: build-rancher-ci-image
  cancel-in-progress: false

permissions:
  contents: read
  id-token: none
  packages: write

env:
  ORG: ${{ github.repository_owner }}

jobs:
  setup:
    runs-on: ubuntu-latest
    container: ghcr.io/rancher/ci-image/go1.26:20260423-1@sha256:04d51139d05041cb32ef7616f2edd55ee4150c175219ae92c8f91d44530196a3
    outputs:
      images: ${{ steps.list.outputs.images }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Configure git
        shell: bash
        run: |
          git config --global safe.directory "$(pwd)"
          git config --global user.name "rancher-security-team[bot]"
          git config --global user.email "202797621+rancher-security-team[bot]@users.noreply.github.com"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set image version
        id: version
        shell: bash
        run: echo "value=$(date -u +%Y%m%d)-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Generate
        shell: bash
        run: make generate

      - name: Verify
        shell: bash
        run: make verify

      - name: List changed images
        id: list
        shell: bash
        run: |
          changed=$(go run main.go changed-images --from="${{ github.event.before }}" --to="${{ github.sha }}")
          if [ -z "${changed}" ]; then
            echo "No image-specific changes detected; building all images"
            images=$(awk '/^images:/{f=1;next} /^[a-zA-Z]/{f=0} f && /- /{print $2}' images-lock.yaml | jq -Rcs '[split("\n")[] | select(. != "")]')
          else
            echo "Changed images: ${changed}"
            images=$(echo "${changed}" | tr ' ' '\n' | jq -Rcs '[split("\n")[] | select(. != "")]')
          fi
          echo "images=${images}" >> "$GITHUB_OUTPUT"

  build-ci-image:
    needs: [setup]
    runs-on: ubuntu-latest
    container: ghcr.io/rancher/ci-image/go1.26:20260423-1@sha256:04d51139d05041cb32ef7616f2edd55ee4150c175219ae92c8f91d44530196a3
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.setup.outputs.images) }}
    steps:
      - name: Configure git
        shell: bash
        run: |
          git config --global safe.directory "$(pwd)"
          git config --global user.name "rancher-security-team[bot]"
          git config --global user.email "202797621+rancher-security-team[bot]@users.noreply.github.com"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Log in to GHCR
        shell: bash
        run: |
          echo "${GITHUB_TOKEN}" | docker login -u "${GITHUB_ACTOR}" --password-stdin ghcr.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        shell: bash
        run: make push NO_CACHE=1 ORG="${ORG}" IMAGE="${IMAGE}" VERSION="${VERSION}"
        env:
          IMAGE: ${{ matrix.image }}
          VERSION: ${{ needs.setup.outputs.version }}

  update-changelog:
    # Runs after all images are built. The top-level concurrency group
    # (cancel-in-progress: false) serializes workflow runs so concurrent merges
    # queue up and write changelog entries in order without racing.
    #
    # CHANGELOG.md lives on the orphan `changelog` branch, not on main, so
    # this commit never re-triggers the push-release workflow.
    needs: [setup, build-ci-image]
    runs-on: ubuntu-latest
    container: registry.suse.com/bci/golang:1.26.2@sha256:0c1bfe51ea14f3e28b4730c725687331ce6aa24c61acea3b9735286789c873b9
    permissions:
      contents: write
      id-token: none
      packages: none
    steps:
      - name: Install needed packages
        shell: bash
        run: |
          zypper -n in git-core make

      - name: Configure git
        shell: bash
        run: |
          git config --global safe.directory "*"
          git config --global user.name "rancher-security-team[bot]"
          git config --global user.email "202797621+rancher-security-team[bot]@users.noreply.github.com"

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: true
          fetch-depth: 0

      - name: Restore CHANGELOG.md from changelog branch
        shell: bash
        run: |
          if git ls-remote --exit-code origin changelog; then
            git fetch origin changelog
            git checkout origin/changelog -- CHANGELOG.md || true
          fi

      - name: Generate changelog entry
        shell: bash
        run: |
          go run main.go changelog generate \
            --version="${{ needs.setup.outputs.version }}" \
            --from="${{ github.event.before }}" \
            --to="${{ github.sha }}"

      - name: Publish to changelog branch
        shell: bash
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          cp CHANGELOG.md /tmp/CHANGELOG.md

          # Switch to the changelog branch (create orphan on first run).
          if git ls-remote --exit-code origin changelog; then
            git checkout -B _changelog origin/changelog
          else
            git checkout --orphan _changelog
            git rm -rf . --quiet
          fi

          cp /tmp/CHANGELOG.md CHANGELOG.md
          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "CHANGELOG.md unchanged, skipping commit"
            exit 0
          fi

          git commit -m "chore: update CHANGELOG.md for ${VERSION}"
          git push origin _changelog:changelog
