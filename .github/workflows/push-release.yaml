name: push and release

on:
  push:
    branches:
      - 'main'
    paths:
      - 'dockerfiles/**'

  workflow_dispatch:

concurrency:
  group: build-rancher-ci-image
  cancel-in-progress: false

permissions:
  contents: read
  id-token: none
  packages: write

env:
  ORG: ${{ github.repository_owner }}

jobs:
  setup:
    runs-on: ubuntu-latest
    container: ghcr.io/rancher/ci-image/go1.26:20260424-8@sha256:9a82b824c9b32c5652d86b2a3d058e35a89ada6d84ee1b356200e2052c0f522d
    outputs:
      images: ${{ steps.list.outputs.images }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Configure git
        shell: bash
        run: |
          git config --global user.name "rancher-security-team[bot]"
          git config --global user.email "202797621+rancher-security-team[bot]@users.noreply.github.com"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set image version
        id: version
        shell: bash
        run: echo "value=$(date -u +%Y%m%d)-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Generate
        shell: bash
        run: make generate

      - name: Verify
        shell: bash
        run: make verify

      - name: Check for dependency updates
        shell: bash
        run: |
          # Run update in dry-run mode to detect new releases without modifying deps.lock.
          # WARNINGs are logged for any release-checksum tool with a newer version available.
          output=$(go run main.go update --dry-run 2>&1) || true
          warnings=$(printf '%s\n' "$output" | grep 'WARNING:' || true)

          if [ -z "$warnings" ]; then
            exit 0
          fi

          {
            echo "## :warning: Dependency Updates Available"
            echo ""
            echo "The following release-checksum tools have new versions available:"
            echo ""
            printf '%s\n' "$warnings" | while IFS= read -r line; do
              echo "- ${line#*WARNING: }"
            done
            echo ""
            echo "Run \`go run main.go update\` to refresh \`deps.lock\` and open a PR."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List changed images
        id: list
        shell: bash
        run: |
          changed=$(go run main.go changed-images --from="${{ github.event.before }}" --to="${{ github.sha }}")
          if [ -z "${changed}" ]; then
            echo "No image-specific changes detected; building all images"
            images=$(awk '/^images:/{f=1;next} /^[a-zA-Z]/{f=0} f && /- /{print $2}' images-lock.yaml | jq -Rcs '[split("\n")[] | select(. != "")]')
          else
            echo "Changed images: ${changed}"
            images=$(echo "${changed}" | tr ' ' '\n' | jq -Rcs '[split("\n")[] | select(. != "")]')
          fi
          echo "images=${images}" >> "$GITHUB_OUTPUT"

  build-ci-image:
    needs: [setup]
    runs-on: ubuntu-latest
    container: ghcr.io/rancher/ci-image/go1.26:20260424-8@sha256:9a82b824c9b32c5652d86b2a3d058e35a89ada6d84ee1b356200e2052c0f522d
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.setup.outputs.images) }}
    steps:
      - name: Configure git
        shell: bash
        run: |
          git config --global user.name "rancher-security-team[bot]"
          git config --global user.email "202797621+rancher-security-team[bot]@users.noreply.github.com"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Log in to GHCR
        shell: bash
        run: |
          echo "${GITHUB_TOKEN}" | docker login -u "${GITHUB_ACTOR}" --password-stdin ghcr.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        shell: bash
        run: make push NO_CACHE=1 ORG="${ORG}" IMAGE="${IMAGE}" VERSION="${VERSION}"
        env:
          IMAGE: ${{ matrix.image }}
          VERSION: ${{ needs.setup.outputs.version }}

  update-changelog:
    # Runs after all images are built. The top-level concurrency group
    # (cancel-in-progress: false) serializes workflow runs so concurrent merges
    # queue up and write changelog entries in order without racing.
    #
    # CHANGELOG.md lives on the orphan `changelog` branch, not on main, so
    # this commit never re-triggers the push-release workflow.
    needs: [setup, build-ci-image]
    runs-on: ubuntu-latest
    container: ghcr.io/rancher/ci-image/go1.26:20260424-8@sha256:9a82b824c9b32c5652d86b2a3d058e35a89ada6d84ee1b356200e2052c0f522d
    permissions:
      contents: write
      id-token: none
      packages: none
    steps:
      - name: Configure git
        shell: bash
        run: |
          git config --global user.name "rancher-security-team[bot]"
          git config --global user.email "202797621+rancher-security-team[bot]@users.noreply.github.com"

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set up changelog worktree
        shell: bash
        run: |
          # The orphan branch won't exist on forks or a brand-new repo on first run.
          if git ls-remote --exit-code origin changelog; then
            git fetch origin changelog
            git worktree add ./changelog-dir origin/changelog
          else
            git worktree add --orphan ./changelog-dir changelog
          fi

      - name: Generate changelog entry
        shell: bash
        run: |
          go run main.go changelog generate \
            --version="${{ needs.setup.outputs.version }}" \
            --from="${{ github.event.before }}" \
            --to="${{ github.sha }}" \
            --changelog="./changelog-dir/CHANGELOG.md"

      - name: Publish to changelog branch
        shell: bash
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          git -C ./changelog-dir add CHANGELOG.md

          if git -C ./changelog-dir diff --cached --quiet; then
            echo "CHANGELOG.md unchanged, skipping commit"
            exit 0
          fi

          git -C ./changelog-dir commit -m "chore: update CHANGELOG.md for ${VERSION}"
          git -C ./changelog-dir push origin HEAD:changelog
